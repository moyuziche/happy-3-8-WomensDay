<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三八妇女节快乐 - 献给最美的妈妈</title>
<style>
    /* === 基础设定与全局滚动 === */
    html {
        scroll-behavior: smooth; /* 平滑滚动效果 */
    }
    body {
        margin: 0; padding: 0;
        font-family: '楷体', 'STKaiti', serif;
        background: linear-gradient(135deg, #fff0f5 0%, #ffd1dc 100%);
        background-attachment: fixed; /* 背景固定，不随内容滚动 */
        color: #555;
    }

    /* === 飘落的康乃馨花瓣 === */
    .petals {
        position: fixed; /* 改为fixed，让花瓣始终在屏幕前 */
        top: 0; left: 0; right: 0; bottom: 0;
        pointer-events: none; z-index: 1;
        background-image: 
            radial-gradient(circle at 20% 30%, rgba(255, 182, 193, 0.4) 10px, transparent 40px),
            radial-gradient(circle at 80% 20%, rgba(255, 192, 203, 0.5) 15px, transparent 50px),
            radial-gradient(circle at 10% 80%, rgba(255, 105, 180, 0.3) 20px, transparent 60px),
            radial-gradient(circle at 85% 90%, rgba(255, 182, 193, 0.4) 12px, transparent 45px);
        animation: float-petals 15s ease-in-out infinite alternate;
    }
    @keyframes float-petals { 0% { transform: translateY(0px) rotate(0deg); } 100% { transform: translateY(-30px) rotate(5deg); } }

    /* === 音乐按钮 === */
    .music-btn {
        position: fixed; top: 25px; right: 25px; width: 45px; height: 45px;
        background-color: rgba(255, 255, 255, 0.6); border: 2px solid #ffb6c1; border-radius: 50%;
        display: flex; justify-content: center; align-items: center; font-size: 20px;
        cursor: pointer; z-index: 100; transition: all 0.3s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .music-btn.playing { background-color: #ff69b4; color: white; box-shadow: 0 0 15px rgba(255, 105, 180, 0.6); animation: spin 4s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* === 分屏容器设计 === */
    .section {
        min-height: 100vh; /* 每屏至少占满一个屏幕高度 */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 60px 20px;
        box-sizing: border-box;
        position: relative;
        z-index: 10;
    }

    /* === 玻璃质感文字卡片 === */
    .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        padding: 40px;
        border-radius: 20px;
        border: 2px solid rgba(255, 255, 255, 0.8);
        box-shadow: 0 10px 30px rgba(216, 27, 96, 0.1);
        text-align: center;
        max-width: 800px;
        margin-bottom: 40px;
    }
    .glass-card h1 { color: #d81b60; font-size: 36px; margin-top: 0; letter-spacing: 2px; }
    .glass-card h2 { color: #e91e63; font-size: 28px; margin-top: 0; }
    .glass-card p { font-size: 20px; line-height: 2; margin-bottom: 0; }

    /* 下滑提示小箭头 */
    .scroll-down {
        position: absolute; bottom: 30px; font-size: 24px; color: #d81b60;
        animation: bounce 2s infinite; font-weight: bold;
    }
    @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-15px); } 60% { transform: translateY(-7px); } }

    /* === 照片网格布局 (用于各个章节) === */
    .photo-grid {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 30px;
        max-width: 1000px;
    }

    /* 拍立得样式卡片 */
    .polaroid {
        background: white;
        padding: 10px 10px 25px 10px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        cursor: pointer; /* 提示可点击 */
    }
    .polaroid img {
        width: 250px; /* 默认宽度 */
        height: 250px;
        object-fit: cover; /* 保证图片不变形 */
        display: block;
    }
    /* 鼠标悬停时的微动效果 */
    .polaroid:hover {
        transform: scale(1.05) translateY(-5px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    
    /* 让照片有一点随机的倾斜，显得更自然 */
    .tilt-left { transform: rotate(-3deg); }
    .tilt-right { transform: rotate(4deg); }
    .tilt-left:hover { transform: scale(1.05) rotate(-3deg); }
    .tilt-right:hover { transform: scale(1.05) rotate(4deg); }

    /* === 照片放大灯箱 (Lightbox) === */
    .lightbox {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background-color: rgba(0, 0, 0, 0.85); /* 黑色半透明背景 */
        z-index: 1000;
        display: flex; justify-content: center; align-items: center;
        opacity: 0; pointer-events: none; /* 默认隐藏 */
        transition: opacity 0.3s ease;
    }
    .lightbox.active {
        opacity: 1; pointer-events: auto; /* 激活时显示并允许点击 */
    }
    .lightbox img {
        max-width: 90%; max-height: 90%;
        border: 10px solid white; border-radius: 5px;
        box-shadow: 0 0 30px rgba(0,0,0,0.5);
        transform: scale(0.8); transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .lightbox.active img {
        transform: scale(1); /* 弹出时有放大效果 */
    }
    .close-btn {
        position: absolute; top: 20px; right: 30px; color: white;
        font-size: 40px; cursor: pointer; font-family: sans-serif;
    }

    /* 手机端适配 */
    @media (max-width: 768px) {
        .glass-card { padding: 25px; margin: 15px; }
        .glass-card h1 { font-size: 26px; }
        .glass-card h2 { font-size: 22px; }
        .glass-card p { font-size: 16px; }
        .polaroid img { width: 140px; height: 140px; }
        .photo-grid { gap: 15px; }
    }
</style>
</head>
<body>
<!-- 背景花瓣 -->
<div class="petals"></div>

<!-- 音乐播放器 -->
<audio id="bgMusic" loop>
    <source src="bgm.mp3" type="audio/mpeg">
</audio>
<div id="musicToggle" class="music-btn" title="播放/暂停音乐">🔇</div>

<!-- 放大查看照片的弹窗 (隐藏状态) -->
<div class="lightbox" id="lightbox">
    <span class="close-btn" id="closeBtn">×</span>
    <img id="lightboxImg" src="" alt="放大照片">
</div>

<!-- === 第一屏：首页寄语 === -->
<div class="section" id="sec1">
    <div class="glass-card">
        <h1>三八妇女节快乐</h1>
        <p>时光荏苒，岁月静好。<br>谢谢您一直以来的包容与爱，<br>祝世界上最美丽的妈妈节日快乐！</p>
    </div>
    <!-- 首屏放一张最有代表性的照片 -->
    <div class="polaroid tilt-right" onclick="openLightbox('399de03069df729f.jpg')">
        <img src="399de03069df729f.jpg" alt="最温暖的拥抱">
    </div>
    <div class="scroll-down">↓ 向下滑动翻阅相册 ↓</div>
</div>

<!-- === 第二屏：时光与陪伴 === -->
<div class="section" id="sec2">
    <div class="glass-card">
        <h2>点滴陪伴，是最长情的告白</h2>
        <p>从小到大，是您牵着我的手看世界。<br>那些平凡日子里的每一帧画面，<br>都是我心里最珍贵的宝藏。</p>
    </div>
    <div class="photo-grid">
        <div class="polaroid tilt-left" onclick="openLightbox('IMG_20150428_180127.jpg')">
            <img src="IMG_20150428_180127.jpg" alt="一起看书">
        </div>
        <div class="polaroid tilt-right" onclick="openLightbox('IMG_20150211_085608.jpg')">
            <img src="IMG_20150211_085608.jpg" alt="喂鸽子">
        </div>
        <div class="polaroid tilt-left" onclick="openLightbox('microMsg.1437566185753.jpg')">
            <img src="microMsg.1437566185753.jpg" alt="餐厅吃饭">
        </div>
    </div>
</div>

<!-- === 第三屏：致敬您的付出 === -->
<div class="section" id="sec3">
    <div class="glass-card">
        <h2>无私奉献，您是超人也是女神</h2>
        <p>您在工作岗位上闪闪发光，<br>在家庭里为我们遮风挡雨。<br>您把青春给了我们，今天请让我们把掌声献给您。</p>
    </div>
    <div class="photo-grid">
        <div class="polaroid tilt-right" onclick="openLightbox('IMG_20160212_115520.jpg')">
            <img src="IMG_20160212_115520.jpg" alt="护士合影">
        </div>
        <div class="polaroid tilt-left" onclick="openLightbox('microMsg.1423973894349.jpg')">
            <img src="microMsg.1423973894349.jpg" alt="三人合影">
        </div>
        <div class="polaroid tilt-right" onclick="openLightbox('2015年春节摄影microMsg.1424489270003.jpg')">
            <img src="2015年春节摄影microMsg.1424489270003.jpg" alt="春节合影">
        </div>
    </div>
</div>

<!-- === 第四屏：愿您永远美丽 === -->
<div class="section" id="sec4">
    <div class="glass-card">
        <h2>岁月从不败美人</h2>
        <p>无论多少岁，您永远是我们心中那个爱笑的少女。<br>愿您以后的日子，<br>多喜乐，长安宁，眼里有光，笑里坦荡！</p>
    </div>
    <div class="photo-grid">
        <div class="polaroid tilt-left" onclick="openLightbox('IMG20150913085234.jpg')">
            <img src="IMG20150913085234.jpg" alt="自拍">
        </div>
        <div class="polaroid tilt-right" onclick="openLightbox('microMsg.1414297649490.jpg')">
            <img src="microMsg.1414297649490.jpg" alt="沙滩生活照">
        </div>
        <div class="polaroid tilt-left" onclick="openLightbox('DSC00075.JPG')">
            <img src="DSC00075.JPG" alt="生活照">
        </div>
    </div>
</div>

<script>
    // === 1. 音乐播放逻辑 ===
    const musicToggle = document.getElementById('musicToggle');
    const bgMusic = document.getElementById('bgMusic');
    let isPlaying = false;

    musicToggle.addEventListener('click', () => {
        if (isPlaying) {
            bgMusic.pause();
            musicToggle.classList.remove('playing');
            musicToggle.innerHTML = '🔇';
        } else {
            let playPromise = bgMusic.play();
            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    musicToggle.classList.add('playing');
                    musicToggle.innerHTML = '🎵';
                }).catch(error => {
                    console.log("Play failed: ", error);
                    alert("请先点击一下页面再播放音乐哦。");
                });
            }
        }
        isPlaying = !isPlaying;
    });

    // === 2. 照片灯箱 (放大查看) 逻辑 ===
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const closeBtn = document.getElementById('closeBtn');

    // 打开灯箱的函数 (绑定在HTML的onclick里)
    function openLightbox(imageSrc) {
        lightboxImg.src = imageSrc;
        lightbox.classList.add('active');
    }

    // 点击关闭按钮关闭灯箱
    closeBtn.addEventListener('click', () => {
        lightbox.classList.remove('active');
    });

    // 点击背景黑色区域也能关闭灯箱
    lightbox.addEventListener('click', (e) => {
        // 确保点击的不是图片本身
        if (e.target !== lightboxImg) {
            lightbox.classList.remove('active');
        }
    });
</script>
</body>
</html>
